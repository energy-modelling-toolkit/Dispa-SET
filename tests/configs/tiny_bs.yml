# --------------------------------------------------------------------------- #
# Tiny boundary-sector test: 1 day, 2 zones (Z1, Z2) with H2 boundary sector
# (Z1_h2). Tests power-to-boundary-sector coupling + storage (H2) + flexible
# demand. Uses LP clustering for speed.
# --------------------------------------------------------------------------- #
SimulationDirectory: 'output/sim_tiny_bs'
WriteExcel: 0
WriteGDX: 1
WritePickle: 1

GAMS_folder: ''
cplex_path: ''

StartDate: !!python/tuple [2015, 1, 1, 0, 0, 0]
StopDate:  !!python/tuple [2015, 1, 3, 0, 0, 0]
HorizonLength: 3
LookAhead: 0
DataTimeStep: 1
SimulationTimeStep: 1

SimulationType: 'LP clustered'
ReserveCalculation: 'Generic'
AllowCurtailment: 1
OptimalityGap: 0.005

Demand:                 'data/Load_RealTime/##/2015.csv'
RenewablesAF:           'data/AvailabilityFactors/##/2015.csv'
Outages:                ''
ShareOfFlexibleDemand:  ''
DemandFlexibility:      ''
LoadShedding:           ''
PowerPlantData:         'data/Units_testcase.csv'
NTC:                    'data/NTCs.csv'
Interconnections:       ''
TransmissionGridType:   'NTC'
GridData:               ''
GeoData:                'data/Geo_Coordinates.csv'

HydroScheduling:            'Off'
HydroSchedulingHorizon:     'Annual'
InitialFinalReservoirLevel: 1
ReservoirLevels:            'data/ReservoirLevels.csv'
ReservoirLevelInitial:      ''
ReservoirLevelFinal:        ''
ReservoirScaledInflows:     'data/ScaledInflows.csv'
StorageAlertLevels:         ''
StorageFloodControl:        ''
WaterValue:                 ''
CostLoadShedding:           ''
CostCurtailment:            ''
CostOfSpillage:             'data/boundary_sector/BS_Spillage_cost.csv'
ValueOfLostLoad:            ''
PriceTransmission:          ''

PriceOfGas:        '../Database/FuelPrices/Gas/2015.csv'
PriceOfBlackCoal:  '../Database/FuelPrices/Coal/2015.csv'
PriceOfLignite:    ''
PriceOfCO2:        ''
PriceOfBiomass:    '../Database/FuelPrices/Biomass/2015.csv'
PriceOfFuelOil:    '../Database/FuelPrices/Oil/2015.csv'
PriceOfNuclear:    ''
PriceOfPeat:       ''
PriceOfAmmonia:    ''

ShareOfQuickStartUnits: ''
Reserve2U:              ''
Reserve2D:              ''
PrimaryReserveLimit:    ''
InertiaLimit:           ''
FFRLimit:               ''
FFRGainLimit:           ''
FrequencyStability:     ''
SystemGainLimit:        ''

# --- Boundary sector data (the core feature under test here) ---
BoundarySectorData:             'data/boundary_sector/BS_Inputs.csv'
BoundarySectorNTC:              'data/boundary_sector/BS_NTCs.csv'
BoundarySectorInterconnections: 'data/boundary_sector/BS_NTCs.csv'
SectorXDemand:                  'data/boundary_sector/BS_Demand.csv'
SectorXFlexibleDemand:          'data/boundary_sector/BS_FlexibleDemand.csv'
SectorXFlexibleSupply:          'data/boundary_sector/BS_FlexibleSupply.csv'
SectorXReservoirLevels:         ''
SectorXFloodControl:            'data/boundary_sector/BS_Flood_control.csv'
BoundarySectorMaxSpillage:      'data/boundary_sector/BS_Spillage_Capacity.csv'

zones: ['Z1', 'Z2']
mts_zones: ['Z1', 'Z2']
all_zones: ['Z1', 'Z2']

ReserveParticipation:
  - GTUR
  - HDAM
  - HPHS
  - ICEN
  - BATS
  - P2HT
  - REHE
ReserveParticipation_CHP:
  - GTUR
  - ICEN

modifiers: {Demand: 1.0, Solar: 1.0, Wind: 1.0, Storage: 1.0}
default:
  ShareOfFlexibleDemand: 0
  DemandFlexibility:     0
  LoadShedding:          0.05
  ReservoirLevelInitial: 0.5
  ReservoirLevelFinal:   0.5
  WaterValue:            100
  CostLoadShedding:      1500
  CostCurtailment:       20
  CostOfSpillage:        1
  ValueOfLostLoad:       100000
  PriceTransmission:     0
  PriceOfGas:            44
  PriceOfBlackCoal:      18
  PriceOfLignite:        15
  PriceOfCO2:            90
  PriceOfBiomass:        33
  PriceOfFuelOil:        60
  PriceOfNuclear:        4
  PriceOfPeat:           33
  PriceOfAmmonia:        76
  ShareOfQuickStartUnits: 0.5
  CostHeatSlack:         70
