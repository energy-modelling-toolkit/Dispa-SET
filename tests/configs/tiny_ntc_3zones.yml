# --------------------------------------------------------------------------- #
# NTC 3-zone test configuration — companion to tiny_dcpf.yml.
# Same 3-zone topology (Z1 generator only, Z2 and ZZ3 pure-load) but using
# standard NTC-based transmission instead of DC power flow.
#
# The comparison between this config and tiny_dcpf.yml illustrates:
#  - NTC: optimizer routes power freely (Z1→Z2 directly, Z1→ZZ3 directly)
#  - DC-PF: physics forces loop flow through ZZ3→Z2 even though ZZ3 is a
#            pure load zone (loop current effect).
# --------------------------------------------------------------------------- #
SimulationDirectory: 'output/sim_tiny_ntc3'
WriteExcel: 0
WriteGDX: 1
WritePickle: 1

GAMS_folder: ''
cplex_path: ''

StartDate: !!python/tuple [2015, 1, 1, 0, 0, 0]
StopDate:  !!python/tuple [2015, 1, 2, 0, 0, 0]
HorizonLength: 3
LookAhead: 0
DataTimeStep: 1
SimulationTimeStep: 1

SimulationType: 'LP clustered'
ReserveCalculation: 'Generic'
AllowCurtailment: 1
OptimalityGap: 0.001

Demand:                 'data/Load_RealTime/##/2015.csv'
RenewablesAF:           'data/AvailabilityFactors/##/2015.csv'
Outages:                ''
ShareOfFlexibleDemand:  ''
DemandFlexibility:      ''
LoadShedding:           ''
PowerPlantData:         'data/Units_dcpf.csv'
NTC:                    'data/NTCs.csv'
Interconnections:       ''
TransmissionGridType:   'NTC'
GridData:               ''
GeoData:                'data/Geo_Coordinates.csv'

HydroScheduling:            'Off'
HydroSchedulingHorizon:     'Annual'
InitialFinalReservoirLevel: 1
ReservoirLevels:            ''
ReservoirLevelInitial:      ''
ReservoirLevelFinal:        ''
ReservoirScaledInflows:     ''
StorageAlertLevels:         ''
StorageFloodControl:        ''
WaterValue:                 ''
CostLoadShedding:           ''
CostCurtailment:            ''
CostOfSpillage:             ''
ValueOfLostLoad:            ''
PriceTransmission:          ''

PriceOfGas:        '../Database/FuelPrices/Gas/2015.csv'
PriceOfBlackCoal:  ''
PriceOfLignite:    ''
PriceOfCO2:        ''
PriceOfBiomass:    ''
PriceOfFuelOil:    ''
PriceOfNuclear:    ''
PriceOfPeat:       ''
PriceOfAmmonia:    ''

ShareOfQuickStartUnits: ''
Reserve2U:              ''
Reserve2D:              ''
PrimaryReserveLimit:    ''
InertiaLimit:           ''
FFRLimit:               ''
FFRGainLimit:           ''
FrequencyStability:     ''
SystemGainLimit:        ''

BoundarySectorData:             ''
BoundarySectorNTC:              ''
BoundarySectorInterconnections: ''
SectorXDemand:                  ''
SectorXFlexibleDemand:          ''
SectorXFlexibleSupply:          ''
SectorXReservoirLevels:         ''
SectorXFloodControl:            ''
BoundarySectorMaxSpillage:      ''

zones: ['Z1', 'Z2', 'ZZ3']
mts_zones: ['Z1', 'Z2', 'ZZ3']
all_zones: ['Z1', 'Z2', 'ZZ3']

ReserveParticipation:
  - COMC
ReserveParticipation_CHP: []

modifiers: {Demand: 0.02, Solar: 1.0, Wind: 1.0, Storage: 1.0}
default:
  ShareOfFlexibleDemand: 0
  DemandFlexibility:     0
  LoadShedding:          0.05
  ReservoirLevelInitial: 0.5
  ReservoirLevelFinal:   0.5
  WaterValue:            100
  CostLoadShedding:      1500
  CostCurtailment:       20
  CostOfSpillage:        1
  ValueOfLostLoad:       100000
  PriceTransmission:     0
  PriceOfGas:            44
  PriceOfBlackCoal:      18
  PriceOfLignite:        15
  PriceOfCO2:            90
  PriceOfBiomass:        33
  PriceOfFuelOil:        60
  PriceOfNuclear:        4
  PriceOfPeat:           33
  PriceOfAmmonia:        76
  ShareOfQuickStartUnits: 0.5
  CostHeatSlack:         70
  CostXNotServed:        1000
  CostXSpillage:         1
