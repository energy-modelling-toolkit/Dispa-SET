# --------------------------------------------------------------------------- #
# "Ultimate" Dispa-SET integration test. Three fictitious zones (Z1, Z2, ZZ3)
# with a CHP unit, hydro storage, batteries, an electrolyzer and a fuel-cell
# all coupled through a hydrogen boundary sector. Limited to 3 days to keep
# the test fast (was originally 1 year in scripts/test_build_solve_display.py).
#
# Used by tests/ultimate/test_full_pipeline.py to exercise the full chain
# (build -> solve -> postprocess -> plot) with most features enabled.
# --------------------------------------------------------------------------- #
Description: Tiny end-to-end integration test, 3 days, 3 zones, boundary sector + CHP.
SimulationType: Integer clustering
SimulationDirectory: output/sim_ultimate

StartDate: !!python/tuple [2015, 1, 1, 0, 0, 0]
StopDate:  !!python/tuple [2015, 1, 4, 0, 0, 0]      # 3 days
DataTimeStep: 1
SimulationTimeStep: 1
HorizonLength: 3
LookAhead: 1
AllowCurtailment: 1
GAMS_folder: ''
WriteGDX: 1
WritePickle: 1

# --- Path-based inputs ---
Demand: data/Load_RealTime/##/2015.csv
RenewablesAF: data/AvailabilityFactors/##/2015.csv
Outages: data/Outages.csv
ShareOfFlexibleDemand: data/ShareFlex.csv
DemandFlexibility: ''
LoadShedding: ''
PowerPlantData: data/Units_testcase.csv
NTC: data/NTCs.csv
Interconnections: data/CrossBorderFlows.csv
TransmissionGridType: NTC
GridData: data/GridData.csv
GeoData: data/Geo_Coordinates.csv

HydroScheduling: 'Off'
HydroSchedulingHorizon: 'Annual'
InitialFinalReservoirLevel: 1
ReservoirLevels: data/ReservoirLevels.csv
ReservoirLevelInitial: ''
ReservoirLevelFinal: ''
ReservoirScaledInflows: data/ScaledInflows.csv
StorageAlertLevels: ''
StorageFloodControl: ''
WaterValue: ''
CostLoadShedding: ''
CostCurtailment: ''
CostOfSpillage: data/boundary_sector/BS_Spillage_cost.csv
ValueOfLostLoad: ''
PriceTransmission: ''

PriceOfGas: ../Database/FuelPrices/Gas/2015.csv
PriceOfBlackCoal: ../Database/FuelPrices/Coal/2015.csv
PriceOfLignite: ''
PriceOfCO2: ''
PriceOfBiomass: ../Database/FuelPrices/Biomass/2015.csv
