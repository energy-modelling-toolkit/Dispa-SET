# --------------------------------------------------------------------------- #
# DC Power Flow test configuration: 3 zones (Z1, Z2, ZZ3) connected in a
# triangle. Z1 is the only generator zone; Z2 and ZZ3 are pure-load zones.
# TransmissionGridType: 'DC-Power Flow' → PTDF-based line-flow constraints.
#
# GridData_tiny.csv defines asymmetric reactances so that loop flows are
# clearly different from what NTC would compute:
#   Z1→Z2:   X=0.10  (low reactance, high susceptance → carries most power)
#   ZZ3→Z2:  X=0.10
#   Z1→ZZ3:  X=0.40  (high reactance, low susceptance → carries less power)
#
# With modifier=0.02 the approximate peak flows are:
#   Z1→Z2:   ~153 MW  (DC-PF) vs ~170 MW  (NTC)
#   ZZ3→Z2:  ~ +17 MW (DC-PF loop flow) vs ~0 MW (NTC)
#   Z1→ZZ3:  ~ 34 MW  (DC-PF) vs ~17 MW  (NTC)
# --------------------------------------------------------------------------- #
SimulationDirectory: 'output/sim_tiny_dcpf'
WriteExcel: 0
WriteGDX: 1
WritePickle: 1

GAMS_folder: ''
cplex_path: ''

StartDate: !!python/tuple [2015, 1, 1, 0, 0, 0]
StopDate:  !!python/tuple [2015, 1, 2, 0, 0, 0]      # 1 day (fast)
HorizonLength: 3
LookAhead: 0
DataTimeStep: 1
SimulationTimeStep: 1

SimulationType: 'LP clustered'
ReserveCalculation: 'Generic'
AllowCurtailment: 1
OptimalityGap: 0.001

Demand:                 'data/Load_RealTime/##/2015.csv'
RenewablesAF:           'data/AvailabilityFactors/##/2015.csv'
Outages:                ''
ShareOfFlexibleDemand:  ''
DemandFlexibility:      ''
LoadShedding:           ''
PowerPlantData:         'data/Units_dcpf.csv'
NTC:                    ''
Interconnections:       ''
TransmissionGridType:   'DC-Power Flow'
GridData:               'data/GridData_tiny.csv'
GeoData:                'data/Geo_Coordinates.csv'

HydroScheduling:            'Off'
HydroSchedulingHorizon:     'Annual'
InitialFinalReservoirLevel: 1
ReservoirLevels:            ''
ReservoirLevelInitial:      ''
ReservoirLevelFinal:        ''
ReservoirScaledInflows:     ''
StorageAlertLevels:         ''
StorageFloodControl:        ''
WaterValue:                 ''
CostLoadShedding:           ''
CostCurtailment:            ''
CostOfSpillage:             ''
ValueOfLostLoad:            ''
PriceTransmission:          ''

PriceOfGas:        '../Database/FuelPrices/Gas/2015.csv'
PriceOfBlackCoal:  ''
PriceOfLignite:    ''
PriceOfCO2:        ''
PriceOfBiomass:    ''
PriceOfFuelOil:    ''
PriceOfNuclear:    ''
PriceOfPeat:       ''
PriceOfAmmonia:    ''

ShareOfQuickStartUnits: ''
Reserve2U:              ''
Reserve2D:              ''
PrimaryReserveLimit:    ''
InertiaLimit:           ''
FFRLimit:               ''
FFRGainLimit:           ''
FrequencyStability:     ''
SystemGainLimit:        ''

BoundarySectorData:             ''
BoundarySectorNTC:              ''
BoundarySectorInterconnections: ''
SectorXDemand:                  ''
SectorXFlexibleDemand:          ''
SectorXFlexibleSupply:          ''
SectorXReservoirLevels:         ''
SectorXFloodControl:            ''
BoundarySectorMaxSpillage:      ''

# Z1 is the sole generator; Z2 and ZZ3 are pure-load.
# With modifier=0.02: Z1 load≈188 MW, Z2≈170 MW, ZZ3≈17 MW.
# The 500 MW gas unit in Z1 dispatches ~375 MW to cover all loads.
zones: ['Z1', 'Z2', 'ZZ3']
mts_zones: ['Z1', 'Z2', 'ZZ3']
all_zones: ['Z1', 'Z2', 'ZZ3']

ReserveParticipation:
  - COMC
ReserveParticipation_CHP: []

modifiers: {Demand: 0.02, Solar: 1.0, Wind: 1.0, Storage: 1.0}
default:
  ShareOfFlexibleDemand: 0
  DemandFlexibility:     0
  LoadShedding:          0.05
  ReservoirLevelInitial: 0.5
  ReservoirLevelFinal:   0.5
  WaterValue:            100
  CostLoadShedding:      1500
  CostCurtailment:       20
  CostOfSpillage:        1
  ValueOfLostLoad:       100000
  PriceTransmission:     0
  PriceOfGas:            44
  PriceOfBlackCoal:      18
  PriceOfLignite:        15
  PriceOfCO2:            90
  PriceOfBiomass:        33
  PriceOfFuelOil:        60
  PriceOfNuclear:        4
  PriceOfPeat:           33
  PriceOfAmmonia:        76
  ShareOfQuickStartUnits: 0.5
  CostHeatSlack:         70
  CostXNotServed:        1000
  CostXSpillage:         1
