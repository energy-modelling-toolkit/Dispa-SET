# --------------------------------------------------------------------------- #
# Dispa-SET test configuration: tiny LP single-zone case.
# Smallest possible setup: zone Z1 only, 1 day (24 h), look-ahead 0.
# Used by all "fast" integration tests that need a build + solve.
# --------------------------------------------------------------------------- #
SimulationDirectory: 'output/sim_tiny'
WriteExcel: 0
WriteGDX: 1
WritePickle: 1

GAMS_folder: ''
cplex_path: ''

# --- Time horizon (very short on purpose) ---
StartDate: !!python/tuple [2015, 1, 1, 0, 0, 0]
StopDate:  !!python/tuple [2015, 1, 2, 0, 0, 0]      # one day
HorizonLength: 3
LookAhead: 0
DataTimeStep: 1
SimulationTimeStep: 1

# --- Simulation type ---
SimulationType: 'LP clustered'
ReserveCalculation: 'Generic'
AllowCurtailment: 1

# --- Optimisation gap / settings ---
OptimalityGap: 0.001

# --- Path-based inputs (data slice for the same year/zones) ---
Demand:                 'data/Load_RealTime/##/2015.csv'
RenewablesAF:           'data/AvailabilityFactors/##/2015.csv'
Outages:                ''
ShareOfFlexibleDemand:  ''
DemandFlexibility:      ''
LoadShedding:           ''
PowerPlantData:         'data/Units_tiny.csv'
NTC:                    ''
Interconnections:       ''
TransmissionGridType:   'NTC'
GridData:               ''
GeoData:                'data/Geo_Coordinates.csv'

# --- Hydro / storage ---
HydroScheduling:            'Off'
HydroSchedulingHorizon:     'Annual'
InitialFinalReservoirLevel: 1
ReservoirLevels:            'data/ReservoirLevels.csv'
ReservoirLevelInitial:      ''
ReservoirLevelFinal:        ''
ReservoirScaledInflows:     'data/ScaledInflows.csv'
StorageAlertLevels:         ''
StorageFloodControl:        ''
WaterValue:                 ''
CostLoadShedding:           ''
CostCurtailment:            ''
CostOfSpillage:             ''
ValueOfLostLoad:            ''
PriceTransmission:          ''

# --- Fuel prices (use defaults) ---
PriceOfGas:        '../Database/FuelPrices/Gas/2015.csv'
PriceOfBlackCoal:  '../Database/FuelPrices/Coal/2015.csv'
PriceOfLignite:    ''
PriceOfCO2:        ''
PriceOfBiomass:    '../Database/FuelPrices/Biomass/2015.csv'
PriceOfFuelOil:    '../Database/FuelPrices/Oil/2015.csv'
PriceOfNuclear:    ''
PriceOfPeat:       ''
PriceOfAmmonia:    ''

# --- Reserves (turned off for the tiny LP run) ---
ReserveCalculation:     'Generic'
ShareOfQuickStartUnits: ''
Reserve2U:              ''
Reserve2D:              ''
PrimaryReserveLimit:    ''
InertiaLimit:           ''
FFRLimit:               ''
FFRGainLimit:           ''
FrequencyStability:     ''
SystemGainLimit:        ''

# --- Boundary sector (fully empty here) ---
BoundarySectorData:             ''
BoundarySectorNTC:              ''
BoundarySectorInterconnections: ''
SectorXDemand:                  ''
SectorXFlexibleDemand:          ''
SectorXFlexibleSupply:          ''
SectorXReservoirLevels:         ''
SectorXFloodControl:            ''
BoundarySectorMaxSpillage:      ''

# --- Zones (only one zone for the tiniest test) ---
zones: ['Z1']
mts_zones: ['Z1']
all_zones: ['Z1']

ReserveParticipation:
  - GTUR
  - HDAM
  - HPHS
  - ICEN
  - BATS
ReserveParticipation_CHP: []

# --- Default values (used when path is empty) ---
# Demand: 0.015 keeps peak load (≈ 205 MW) below the firm gas CC capacity
# (300 MW) so the model always solves without involuntary load shedding.
modifiers: {Demand: 0.015, Solar: 1.0, Wind: 1.0, Storage: 1.0}
default:
  ShareOfFlexibleDemand: 0
  DemandFlexibility:     0
  LoadShedding:          0.05
  ReservoirLevelInitial: 0.5
  ReservoirLevelFinal:   0.5
  WaterValue:            100
  CostLoadShedding:      1500
  CostCurtailment:       20
  CostOfSpillage:        1
  ValueOfLostLoad:       100000
  PriceTransmission:     0
  PriceOfGas:            44
  PriceOfBlackCoal:      18
  PriceOfLignite:        15
  PriceOfCO2:            90
  PriceOfBiomass:        33
  PriceOfFuelOil:        60
  PriceOfNuclear:        4
  PriceOfPeat:           33
  PriceOfAmmonia:        76
  ShareOfQuickStartUnits: 0.5
  CostHeatSlack:         70
  PrimaryReserveLimit:   ''
  InertiaLimit:          ''
  FFRLimit:              ''
  FFRGainLimit:          ''
  SystemGainLimit:       ''
